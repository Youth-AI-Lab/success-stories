<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Youth Ai Lab · France · Success Stories</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Manrope:wght@400;500;600;700&display=swap');
  :root { --bg: #f7f4e8; --ink: #1a1a1a; --soft: #6c6c6c; --yellow: #f9c724; --yellow-deep: #c99c00; --yellow-soft: #f9eecd; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); font-family: 'Manrope', system-ui, sans-serif; color: var(--ink); min-height: 100%; }
  h1, .eyebrow { font-family: 'Bricolage Grotesque', sans-serif; }
  main { max-width: 1100px; margin: 0 auto; padding: 60px 32px 80px; }
  .breadcrumb { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; color: var(--soft); margin-bottom: 32px; }
  .breadcrumb a { color: var(--soft); text-decoration: none; }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb .sep { opacity: 0.4; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; background: var(--yellow-soft); color: var(--yellow-deep); border-radius: 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
  h1 { font-size: 56px; font-weight: 900; line-height: 1; letter-spacing: -1.5px; margin-bottom: 14px; }
  h1 em { color: var(--yellow-deep); font-style: normal; }
  .lead { font-size: 17px; color: var(--soft); line-height: 1.6; max-width: 600px; margin-bottom: 56px; }
  .stories { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
  .story-card { display: block; background: #fff; border-radius: 18px; padding: 24px; text-decoration: none; color: var(--ink); transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
  .story-card:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,0,0,0.1); }
  .story-card .num { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 12px; background: var(--yellow-soft); color: var(--yellow-deep); font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 16px; }
  .story-card .title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .story-card .meta { font-size: 12px; color: var(--soft); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .empty-card { background: transparent; border: 2px dashed rgba(0,0,0,0.12); padding: 28px; color: var(--soft); font-style: italic; text-align: center; border-radius: 18px; display: flex; align-items: center; justify-content: center; min-height: 160px; }
  footer { margin-top: 80px; padding-top: 32px; border-top: 1px solid rgba(0,0,0,0.08); color: var(--soft); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  footer a { color: inherit; text-decoration: underline; }
</style>
</head>
<body>
<main>
  <div class="breadcrumb">
    <a href="../">Youth Ai Lab</a>
    <span class="sep">·</span>
    <span>France</span>
  </div>
  <span class="eyebrow">Centrale Lab · France</span>
  <h1>Stories from<br><em>L.A.B.O.</em></h1>
  <p class="lead">Success stories written by the Centrale Lab team across reporting periods.</p>
  <div class="stories">
    <div class="empty-card">No story published yet. Check back soon.</div>
  </div>
  <footer>
    <a href="../">← All countries</a>
    &nbsp;·&nbsp;
    <a href="https://youth-ai-lab.eu/">youth-ai-lab.eu</a>
  </footer>
</main>
</body>
</html>
