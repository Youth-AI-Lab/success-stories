<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Youth Ai Lab · Belgium · Success Stories</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Manrope:wght@400;500;600;700&display=swap');
  :root { --bg: #f7f4e8; --ink: #1a1a1a; --soft: #6c6c6c; --blue: #38b6ff; --blue-deep: #1d8fd1; --blue-soft: #cbecff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); font-family: 'Manrope', system-ui, sans-serif; color: var(--ink); min-height: 100%; }
  h1, .eyebrow { font-family: 'Bricolage Grotesque', sans-serif; }
  main { max-width: 1100px; margin: 0 auto; padding: 60px 32px 80px; }
  .breadcrumb { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; color: var(--soft); margin-bottom: 32px; }
  .breadcrumb a { color: var(--soft); text-decoration: none; }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb .sep { opacity: 0.4; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; background: var(--blue-soft); color: var(--blue-deep); border-radius: 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
  h1 { font-size: 56px; font-weight: 900; line-height: 1; letter-spacing: -1.5px; margin-bottom: 14px; }
  h1 em { color: var(--blue); font-style: normal; }
  .lead { font-size: 17px; color: var(--soft); line-height: 1.6; max-width: 600px; margin-bottom: 56px; }
  .empty-card { background: transparent; border: 2px dashed rgba(0,0,0,0.12); padding: 60px 28px; color: var(--soft); font-style: italic; text-align: center; border-radius: 18px; max-width: 600px; }
  footer { margin-top: 80px; padding-top: 32px; border-top: 1px solid rgba(0,0,0,0.08); color: var(--soft); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  footer a { color: inherit; text-decoration: underline; }
</style>
</head>
<body>
<main>
  <div class="breadcrumb">
    <a href="../">Youth Ai Lab</a>
    <span class="sep">·</span>
    <span>Belgium</span>
  </div>
  <span class="eyebrow">Wolfpack · Belgium</span>
  <h1>Stories from<br><em>Wolfpack.</em></h1>
  <p class="lead">Success stories written by the Wolfpack team.</p>
  <div class="empty-card">No story published yet. Check back soon.</div>
  <footer>
    <a href="../">← All countries</a>
    &nbsp;·&nbsp;
    <a href="https://youth-ai-lab.eu/">youth-ai-lab.eu</a>
  </footer>
</main>
</body>
</html>
